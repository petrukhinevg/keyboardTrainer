name: Task
description: Track a development task
title: "[Task] "
labels:
  - task
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What needs to be achieved
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this task
    validations:
      required: true
  - type: textarea
    id: done_criteria
    attributes:
      label: Done Criteria
      description: Conditions that define completion
    validations:
      required: true
