spring:
  application:
    name: keyboardTrainer
  datasource:
    url: jdbc:h2:file:./data/keyboard-trainer;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
