spring:
  datasource:
    url: jdbc:h2:file:${app.h2.data-dir}/keyboard-trainer;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  h2:
    data-dir: ${H2_DATA_DIR:./data}
